<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="piGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Terminal window frame -->
  <rect x="140" y="180" width="744" height="540" rx="24" fill="#0d1117" stroke="#30363d" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="140" y="180" width="744" height="52" rx="24" fill="#21262d"/>
  <rect x="140" y="208" width="744" height="24" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="184" cy="206" r="10" fill="#f85149"/>
  <circle cx="216" cy="206" r="10" fill="#d29922"/>
  <circle cx="248" cy="206" r="10" fill="#3fb950"/>

  <!-- Title text -->
  <text x="512" y="212" text-anchor="middle" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="18" font-weight="500">hassio@raspberrypi ~ claude</text>

  <!-- Terminal screen -->
  <rect x="143" y="232" width="738" height="485" fill="url(#screen)"/>

  <!-- Terminal prompt line 1 -->
  <text x="176" y="284" fill="#3fb950" font-family="SF Mono, Menlo, monospace" font-size="26" font-weight="600">$</text>
  <text x="206" y="284" fill="#c9d1d9" font-family="SF Mono, Menlo, monospace" font-size="26">claude --continue</text>

  <!-- Claude response -->
  <text x="176" y="330" fill="#a855f7" font-family="SF Mono, Menlo, monospace" font-size="24" font-weight="600">Claude</text>
  <text x="316" y="330" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="24">is thinking...</text>

  <!-- Code block -->
  <rect x="176" y="356" width="520" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="196" y="386" fill="#ff7b72" font-family="SF Mono, Menlo, monospace" font-size="20">func</text>
  <text x="256" y="386" fill="#d2a8ff" font-family="SF Mono, Menlo, monospace" font-size="20">connect</text>
  <text x="372" y="386" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="20">(host: String) {</text>
  <text x="216" y="418" fill="#79c0ff" font-family="SF Mono, Menlo, monospace" font-size="20">ssh</text>
  <text x="264" y="418" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="20">.open(host)</text>
  <text x="196" y="450" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="20">}</text>

  <!-- Cursor blink -->
  <rect x="176" y="500" width="14" height="26" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Raspberry Pi symbol (bottom right) -->
  <g transform="translate(760, 760)">
    <!-- Pi berry -->
    <circle cx="0" cy="0" r="80" fill="url(#piGreen)" opacity="0.9"/>
    <!-- Pi letter -->
    <text x="0" y="18" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="90" font-weight="700" opacity="0.95">Pi</text>
    <!-- Subtle glow -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.3"/>
  </g>

  <!-- Purple accent line at bottom -->
  <rect x="140" y="710" width="744" height="4" rx="2" fill="url(#glow)" opacity="0.6"/>

  <!-- Connection indicator dots -->
  <g transform="translate(512, 820)">
    <circle cx="-60" cy="0" r="8" fill="#3fb950"/>
    <circle cx="-20" cy="0" r="8" fill="#3fb950" opacity="0.7"/>
    <circle cx="20" cy="0" r="8" fill="#3fb950" opacity="0.4"/>
    <circle cx="60" cy="0" r="8" fill="#a855f7" opacity="0.9"/>
  </g>

  <!-- SSH arrow -->
  <g transform="translate(512, 870)">
    <text x="0" y="0" text-anchor="middle" fill="#8b949e" font-family="SF Mono, Menlo, monospace" font-size="28" font-weight="600" opacity="0.5">SSH</text>
  </g>
</svg>
